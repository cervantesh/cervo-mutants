name: external-action-wave

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Path to the hosted-wave manifest checked into this repository.
        required: false
        default: docs/evaluations/external-github-action-wave-v0.4.0-candidates.json

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      manifest_path: ${{ steps.matrix.outputs.manifest_path }}
      tracking_issue: ${{ steps.matrix.outputs.tracking_issue }}
      action_ref: ${{ steps.matrix.outputs.action_ref }}
      checkout_ref: ${{ steps.matrix.outputs.checkout_ref }}
      install_path: ${{ steps.matrix.outputs.install_path }}
    steps:
      - uses: actions/checkout@v7
      - id: matrix
        shell: bash
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          test -f "$MANIFEST_PATH"
          matrix="$(
            jq -c '
              {
                include: [
                  .jobs[] |
                  {
                    name,
                    repository: (.url | sub("^https://github.com/"; "") | sub("\\.git$"; "")),
                    ref,
                    target,
                    profile,
                    policy,
                    budget,
                    max_mutants,
                    workers,
                    sample: (.sample // "")
                  }
                ]
              }
            ' "$MANIFEST_PATH"
          )"
          tracking_issue="$(jq -r '.tracking_issue // ""' "$MANIFEST_PATH")"
          action_ref="$(jq -r '.action_ref // env.GITHUB_SHA' "$MANIFEST_PATH")"
          checkout_ref="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${action_ref}" \
            | jq -r '.sha'
          )"
          if [ -z "$checkout_ref" ] || [ "$checkout_ref" = "null" ]; then
            echo "failed to resolve action_ref '$action_ref' to a commit SHA" >&2
            exit 1
          fi
          install_path="$(jq -r '.install_path // ("github-action@" + (.action_ref // env.GITHUB_SHA))' "$MANIFEST_PATH")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"
          echo "tracking_issue=$tracking_issue" >> "$GITHUB_OUTPUT"
          echo "action_ref=$action_ref" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "install_path=$install_path" >> "$GITHUB_OUTPUT"

  wave:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: cervomut-source
          ref: ${{ needs.plan.outputs.checkout_ref }}

      - uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: target
          fetch-depth: 1

      - name: Run CervoMutants
        id: cervomut
        uses: ./cervomut-source
        with:
          go-version: "1.25.6"
          working-directory: target
          targets: ${{ matrix.target }}
          policy: ${{ matrix.policy }}
          budget: ${{ matrix.budget }}
          report: summary,json,github-summary
          out: .cervomut/external-wave/${{ matrix.name }}
          sample: ${{ matrix.sample }}
          max-mutants: ${{ matrix.max_mutants }}
          workers: ${{ matrix.workers }}

      - name: Extract wave result
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          REPO_NAME: ${{ matrix.name }}
          REPOSITORY: ${{ matrix.repository }}
          REPO_REF: ${{ matrix.ref }}
          TARGET: ${{ matrix.target }}
          PROFILE: ${{ matrix.profile }}
          POLICY: ${{ matrix.policy }}
          BUDGET: ${{ matrix.budget }}
          SAMPLE: ${{ matrix.sample }}
          MAX_MUTANTS: ${{ matrix.max_mutants }}
          WORKERS: ${{ matrix.workers }}
          ACTION_REF: ${{ needs.plan.outputs.action_ref }}
          INSTALL_PATH: ${{ needs.plan.outputs.install_path }}
        run: |
          report_dir="target/.cervomut/external-wave/${REPO_NAME}"
          report_json="$report_dir/mutation-report.json"
          report_kind="full"
          if [ ! -f "$report_json" ]; then
            report_json="$report_dir/partial-mutation-report.json"
            report_kind="partial"
          fi

          generated_at="$(date -u +%FT%TZ)"
          if [ -f "$report_json" ]; then
            ledger_json="$report_dir/semantic-triage-ledger.json"
            if [ ! -f "$ledger_json" ]; then
              printf '{"entries":[]}\n' > ledger-fallback.json
              ledger_json="ledger-fallback.json"
            fi
            governance_json="$report_dir/governance-review.json"
            if [ ! -f "$governance_json" ]; then
              printf '{"quarantine_templates":[],"suppression_templates":[]}\n' > governance-fallback.json
              governance_json="governance-fallback.json"
            fi
            jq -n \
              --arg generated_at "$generated_at" \
              --arg name "$REPO_NAME" \
              --arg repository "$REPOSITORY" \
              --arg install_path "$INSTALL_PATH" \
              --arg action_ref "$ACTION_REF" \
              --arg ref "$REPO_REF" \
              --arg target "$TARGET" \
              --arg profile "$PROFILE" \
              --arg policy "$POLICY" \
              --arg budget "$BUDGET" \
              --arg sample "$SAMPLE" \
              --arg report_dir "$report_dir" \
              --arg report_path "$report_json" \
              --arg report_kind "$report_kind" \
              --arg job_status "$JOB_STATUS" \
              --argjson max_mutants "$MAX_MUTANTS" \
              --argjson workers "$WORKERS" \
              --slurpfile report "$report_json" \
              --slurpfile ledger "$ledger_json" \
              --slurpfile governance "$governance_json" \
              '
              ($report[0]) as $r |
              (($ledger[0].entries // []) | length) as $ledger_entries |
              ((($governance[0].suppression_templates // []) + ($governance[0].quarantine_templates // []))) as $governance_templates |
              (($governance[0].quarantine_templates // []) | length) as $governance_quarantine_templates |
              (($governance[0].suppression_templates // []) | length) as $governance_suppression_templates |
              ($governance_templates | group_by(.status) | map({key: .[0].status, value: length}) | from_entries) as $governance_suggestions_by_status |
              ([$r.mutants[]? | select(.test_recommendation != null)]) as $recommended |
              ($recommended | length) as $recommendation_entries |
              (
                ($recommended | map(select((.mutant.semantic_group // "") == "")) | length) +
                ($recommended | map(.mutant.semantic_group // empty) | unique | length)
              ) as $recommendation_review_units |
              {
                generated_at: $generated_at,
                name: $name,
                repository: $repository,
                install_path: $install_path,
                action_ref: $action_ref,
                ref: $ref,
                target: $target,
                profile: $profile,
                policy: $policy,
                budget: $budget,
                sample: $sample,
                max_mutants: $max_mutants,
                workers: $workers,
                job_status: $job_status,
                report_kind: $report_kind,
                report_dir: $report_dir,
                report_path: $report_path,
                summary: {
                  total: $r.summary.total,
                  killed: $r.summary.killed,
                  survived: $r.summary.survived,
                  not_covered: $r.summary.not_covered,
                  timed_out: $r.summary.timed_out,
                  compile_error: $r.summary.compile_error,
                  score: $r.summary.score,
                  actionable_score: ($r.summary.actionable.actionable_score // null),
                  mutation_coverage: $r.summary.mutation_coverage,
                  test_efficacy: $r.summary.test_efficacy
                },
                triage: {
                  actionable_review_units: ($r.summary.actionable.true_actionable_survivors // 0),
                  actionable_survivors: ($r.summary.actionable.actionable_survivors // 0),
                  equivalent_risk_survivors: ($r.summary.actionable.equivalent_risk_survivors // 0),
                  semantic_group_review_units: ($r.summary.actionable.semantic_group_review_units // 0),
                  collapsed_semantic_duplicates: ($r.summary.actionable.collapsed_semantic_duplicates // 0),
                  semantic_group_count: (($r.summary.semantic_group_statistics // {}) | keys | length),
                  recommendation_entries: $recommendation_entries,
                  recommendation_review_units: $recommendation_review_units,
                  collapsed_recommendation_duplicates: ($recommendation_entries - $recommendation_review_units),
                  ledger_entries: $ledger_entries,
                  governance_quarantine_templates: $governance_quarantine_templates,
                  governance_suppression_templates: $governance_suppression_templates,
                  governance_suggestions_by_status: $governance_suggestions_by_status,
                  governance_total_suggestions: ($governance_quarantine_templates + $governance_suppression_templates)
                },
                denominator_health: ($r.summary.denominator_health // null),
                environment: ($r.environment // null)
              }
              ' > wave-result.json
          else
            jq -n \
              --arg generated_at "$generated_at" \
              --arg name "$REPO_NAME" \
              --arg repository "$REPOSITORY" \
              --arg install_path "$INSTALL_PATH" \
              --arg action_ref "$ACTION_REF" \
              --arg ref "$REPO_REF" \
              --arg target "$TARGET" \
              --arg profile "$PROFILE" \
              --arg policy "$POLICY" \
              --arg budget "$BUDGET" \
              --arg sample "$SAMPLE" \
              --arg report_dir "$report_dir" \
              --arg report_kind "missing" \
              --arg job_status "$JOB_STATUS" \
              --argjson max_mutants "$MAX_MUTANTS" \
              --argjson workers "$WORKERS" \
              '
              {
                generated_at: $generated_at,
                name: $name,
                repository: $repository,
                install_path: $install_path,
                action_ref: $action_ref,
                ref: $ref,
                target: $target,
                profile: $profile,
                policy: $policy,
                budget: $budget,
                sample: $sample,
                max_mutants: $max_mutants,
                workers: $workers,
                job_status: $job_status,
                report_kind: $report_kind,
                report_dir: $report_dir,
                triage: {
                  actionable_review_units: 0,
                  actionable_survivors: 0,
                  equivalent_risk_survivors: 0,
                  semantic_group_review_units: 0,
                  collapsed_semantic_duplicates: 0,
                  semantic_group_count: 0,
                  recommendation_entries: 0,
                  recommendation_review_units: 0,
                  collapsed_recommendation_duplicates: 0,
                  ledger_entries: 0,
                  governance_quarantine_templates: 0,
                  governance_suppression_templates: 0,
                  governance_suggestions_by_status: {},
                  governance_total_suggestions: 0
                }
              }
              ' > wave-result.json
          fi

      - name: Append repo summary
        if: always()
        shell: bash
        run: |
          jq -r '
            "## " + .name,
            "- Repository: `" + .repository + "`",
            "- Install path: `" + .install_path + "` action_ref=`" + .action_ref + "`",
            "- Target: `" + .target + "`",
            "- Profile: `" + .profile + "`",
            "- Policy: `" + .policy + "` sample=`" + (.sample // "") + "` max_mutants=`" + (.max_mutants|tostring) + "` workers=`" + (.workers|tostring) + "`",
            "- Job status: `" + .job_status + "`",
            (
              if .report_kind == "missing" then
                "- Report: missing"
              else
                "- Report: " + .report_kind + " (`" + .report_path + "`)"
              end
            ),
            (
              if .summary then
                "- Generated: **\(.denominator_health.generated // 0)**, effective: **\(.denominator_health.effective // 0)**, killed: **\(.summary.killed)**, survived: **\(.summary.survived)**, not covered: **\(.summary.not_covered)**, score: **\(.summary.score)%**, actionable: **\(.summary.actionable_score)%**"
              else
                "- No report metrics captured"
              end
            ),
            (
              "- Triage: actionable_review_units=**\(.triage.actionable_review_units // 0)**, semantic_groups=**\(.triage.semantic_group_count // 0)**, recommendations=**\(.triage.recommendation_entries // 0)**, ledger_entries=**\(.triage.ledger_entries // 0)**, governance_suggestions=**\(.triage.governance_total_suggestions // 0)**"
            ),
            ""
          ' wave-result.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload wave artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          include-hidden-files: true
          if-no-files-found: warn
          name: external-wave-${{ matrix.name }}
          path: |
            target/.cervomut/external-wave/${{ matrix.name }}
            wave-result.json

  summarize:
    if: always()
    needs:
      - plan
      - wave
    runs-on: ubuntu-latest
    steps:
      - name: Download wave artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: external-wave-*

      - name: Build aggregate summary
        shell: bash
        env:
          TRACKING_ISSUE: ${{ needs.plan.outputs.tracking_issue }}
          MANIFEST_PATH: ${{ needs.plan.outputs.manifest_path }}
          ACTION_REF: ${{ needs.plan.outputs.action_ref }}
          INSTALL_PATH: ${{ needs.plan.outputs.install_path }}
        run: |
          generated_at="$(date -u +%FT%TZ)"
          jq -s \
            --arg generated_at "$generated_at" \
            --arg tracking_issue "$TRACKING_ISSUE" \
            --arg manifest_path "$MANIFEST_PATH" \
            --arg action_ref "$ACTION_REF" \
            --arg install_path "$INSTALL_PATH" \
            '
            {
              schema_version: "1",
              tracking_issue: $tracking_issue,
              manifest_path: $manifest_path,
              action_ref: $action_ref,
              install_path: $install_path,
              generated_at: $generated_at,
              repos: sort_by(.name),
              aggregate: {
                selected: length,
                reports: (map(select(.report_kind != "missing")) | length),
                missing_reports: (map(select(.report_kind == "missing")) | length),
                generated: (map(.denominator_health.generated // 0) | add),
                covered: (map(.denominator_health.covered // 0) | add),
                executed: (map(.denominator_health.executed // 0) | add),
                effective: (map(.denominator_health.effective // 0) | add),
                killed: (map(.summary.killed // 0) | add),
                survived: (map(.summary.survived // 0) | add),
                not_covered: (map(.summary.not_covered // 0) | add),
                timed_out: (map(.summary.timed_out // 0) | add),
                compile_error: (map(.summary.compile_error // 0) | add),
                warning_repos: (map(select((.denominator_health.warnings // []) | length > 0)) | length)
              },
              triage: {
                actionable_review_units: (map(.triage.actionable_review_units // 0) | add),
                actionable_survivors: (map(.triage.actionable_survivors // 0) | add),
                equivalent_risk_survivors: (map(.triage.equivalent_risk_survivors // 0) | add),
                semantic_group_review_units: (map(.triage.semantic_group_review_units // 0) | add),
                collapsed_semantic_duplicates: (map(.triage.collapsed_semantic_duplicates // 0) | add),
                semantic_group_count: (map(.triage.semantic_group_count // 0) | add),
                recommendation_entries: (map(.triage.recommendation_entries // 0) | add),
                recommendation_review_units: (map(.triage.recommendation_review_units // 0) | add),
                collapsed_recommendation_duplicates: (map(.triage.collapsed_recommendation_duplicates // 0) | add),
                ledger_entries: (map(.triage.ledger_entries // 0) | add),
                governance_quarantine_templates: (map(.triage.governance_quarantine_templates // 0) | add),
                governance_suppression_templates: (map(.triage.governance_suppression_templates // 0) | add),
                governance_suggestions_by_status: (
                  reduce (map(.triage.governance_suggestions_by_status // {}))[] as $counts
                    ({};
                      reduce ($counts | to_entries[]) as $entry
                        (.;
                          .[$entry.key] = ((.[$entry.key] // 0) + $entry.value)
                        )
                    )
                ),
                governance_total_suggestions: (map(.triage.governance_total_suggestions // 0) | add),
                repos_with_actionable_review_units: (map(select((.triage.actionable_review_units // 0) > 0)) | length),
                repos_with_semantic_groups: (map(select((.triage.semantic_group_count // 0) > 0)) | length),
                repos_with_recommendations: (map(select((.triage.recommendation_entries // 0) > 0)) | length),
                repos_with_recommendation_review_units: (map(select((.triage.recommendation_review_units // 0) > 0)) | length),
                repos_with_ledger_entries: (map(select((.triage.ledger_entries // 0) > 0)) | length),
                repos_with_governance_suggestions: (map(select((.triage.governance_total_suggestions // 0) > 0)) | length)
              }
            }
            ' artifacts/*/wave-result.json > wave-summary.json

          {
            echo "# External GitHub Action Wave Summary"
            echo
            jq -r '
              def format_status_counts:
                ((. // {}) | to_entries | sort_by(.key) | map("\(.key)=\(.value)") | join(", "));
              (if (.tracking_issue // "") != "" then "- Tracking issue: **\(.tracking_issue)**" else empty end),
              (if (.manifest_path // "") != "" then "- Manifest: `\(.manifest_path)`" else empty end),
              (if (.install_path // "") != "" then "- Install path: `\(.install_path)` action_ref=`\(.action_ref // "")`" else empty end),
              "- Selected repos: **\(.aggregate.selected)**",
              "- Reports captured: **\(.aggregate.reports)**",
              "- Missing reports: **\(.aggregate.missing_reports)**",
              "- Generated mutants: **\(.aggregate.generated)**",
              "- Covered mutants: **\(.aggregate.covered)**",
              "- Executed mutants: **\(.aggregate.executed)**",
              "- Effective mutants: **\(.aggregate.effective)**",
              "- Killed: **\(.aggregate.killed)**",
              "- Survived: **\(.aggregate.survived)**",
              "- Not covered: **\(.aggregate.not_covered)**",
              "- Timed out: **\(.aggregate.timed_out)**",
              "- Compile errors: **\(.aggregate.compile_error)**",
              "- Repos with denominator warnings: **\(.aggregate.warning_repos)**",
              "- Triage actionable review units: **\(.triage.actionable_review_units)**",
              "- Semantic group review units: **\(.triage.semantic_group_review_units)**",
              "- Semantic groups formed: **\(.triage.semantic_group_count)**",
              "- Recommendation entries: **\(.triage.recommendation_entries)**",
              "- Recommendation review units: **\(.triage.recommendation_review_units)**",
              "- Collapsed recommendation duplicates: **\(.triage.collapsed_recommendation_duplicates)**",
              "- Ledger entries: **\(.triage.ledger_entries)**",
              "- Governance suggestions: **\(.triage.governance_total_suggestions)**",
              (if ((.triage.governance_suggestions_by_status // {}) | length) > 0 then "- Governance suggestions by status: `\(.triage.governance_suggestions_by_status | format_status_counts)`" else empty end),
              ""
            ' wave-summary.json
            jq -r '
              def format_status_counts:
                ((. // {}) | to_entries | sort_by(.key) | map("\(.key)=\(.value)") | join(", "));
              .repos[] |
              "## \(.name)\n- Repository: `\(.repository)`\n- Install path: `\(.install_path)` action_ref=`\(.action_ref)`\n- Target: `\(.target)`\n- Profile: `\(.profile)`\n- Policy: `\(.policy)` sample=`\(.sample // "")` max_mutants=`\(.max_mutants)` workers=`\(.workers)`\n- Job status: `\(.job_status)`\n- Report kind: `\(.report_kind)`\n" +
              (
                if .summary then
                  "- Generated: **\(.denominator_health.generated // 0)**, effective: **\(.denominator_health.effective // 0)**, killed: **\(.summary.killed)**, survived: **\(.summary.survived)**, not covered: **\(.summary.not_covered)**, score: **\(.summary.score)%**, actionable: **\(.summary.actionable_score)%**\n- Triage: actionable_review_units=**\(.triage.actionable_review_units // 0)**, semantic_groups=**\(.triage.semantic_group_count // 0)**, recommendations=**\(.triage.recommendation_entries // 0)**, recommendation_review_units=**\(.triage.recommendation_review_units // 0)**, collapsed_recommendation_duplicates=**\(.triage.collapsed_recommendation_duplicates // 0)**, ledger_entries=**\(.triage.ledger_entries // 0)**, governance_suggestions=**\(.triage.governance_total_suggestions // 0)**" +
                  (if ((.triage.governance_suggestions_by_status // {}) | length) > 0 then " (`\(.triage.governance_suggestions_by_status | format_status_counts)`)" else "" end) +
                  "\n"
                else
                  "- No report metrics captured\n"
                end
              )
            ' wave-summary.json
          } > wave-summary.md

      - name: Publish combined summary
        shell: bash
        run: cat wave-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: external-wave-summary
          path: |
            wave-summary.json
            wave-summary.md
