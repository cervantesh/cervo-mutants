name: cervomut

on:
  pull_request:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  pr-lane:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - run: go install github.com/cervantesh/cervo-mutants/cmd/cervomut@latest
      - run: cervomut run ./... --policy ci-balanced --budget 10m --coverage-prefilter --report summary,json,junit,github-summary --out .cervomut/pr

  nightly-lane:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - run: go install github.com/cervantesh/cervo-mutants/cmd/cervomut@latest
      - run: cervomut run ./... --policy nightly --budget 20m --report summary,json,junit,html,sarif,github-summary --out .cervomut/nightly
