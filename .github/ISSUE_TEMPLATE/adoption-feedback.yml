name: Adoption feedback
description: Record external adoption findings about signal quality, review UX, runtime, and rollout friction.
title: "[Adoption Feedback] "
body:
  - type: markdown
    attributes:
      value: |
        Use this template when CervoMutants is being tried on a real repository and you want the result to become actionable product feedback instead of a one-off note.
  - type: dropdown
    id: repo_profile
    attributes:
      label: Repository profile
      description: Choose the closest repository shape.
      options:
        - Compact library
        - Medium service
        - Large repository or monorepo
        - Other or mixed shape
    validations:
      required: true
  - type: dropdown
    id: adoption_stage
    attributes:
      label: Adoption stage
      description: Which rollout phase produced this feedback?
      options:
        - First dry run
        - First useful report
        - Baseline setup
        - Pull request lane
        - Nightly lane
        - History or governance review
        - Comparison or benchmark workflow
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository
      description: Repo name or URL.
      placeholder: github.com/example/service
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Mutation target
      description: Effective target used for the run.
      placeholder: ./...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, and whether the run was local or CI.
      placeholder: windows amd64, go1.25.6, GitHub Actions
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CervoMutants version
      description: Release tag, commit SHA, or local build identifier.
      placeholder: v0.4.3
    validations:
      required: true
  - type: dropdown
    id: install_path
    attributes:
      label: Install path
      description: How was CervoMutants installed or invoked?
      options:
        - go install
        - GitHub release archive
        - Local source build
        - GitHub Action
        - Other
    validations:
      required: true
  - type: dropdown
    id: closest_playbook
    attributes:
      label: Closest rollout playbook followed
      description: Which public rollout path was closest to what you tried?
      options:
        - Small library playbook
        - Medium service playbook
        - Large repository playbook
        - Custom rollout, not based on a published playbook
        - Unsure
    validations:
      required: true
  - type: input
    id: time_to_first_report
    attributes:
      label: Time to first useful report
      description: If known, how long did it take to get to a reviewable report?
      placeholder: 20 minutes
    validations:
      required: false
  - type: textarea
    id: workflow
    attributes:
      label: Workflow shape
      description: Policy, budget, workers, reports, and baseline/quarantine posture.
      placeholder: |
        policy=ci-fast
        budget=5m
        workers=2
        reports=summary,json,junit,github-summary
        baseline-first=true
    validations:
      required: true
  - type: textarea
    id: signal
    attributes:
      label: Mutation signal quality
      description: Which survivors were useful, noisy, equivalent-risk, or unclear?
      placeholder: The top survivors were actionable except comparator-boundary duplicates in package foo.
    validations:
      required: true
  - type: textarea
    id: review_ux
    attributes:
      label: Review UX
      description: Did the HTML report, survivor list, GitHub summary, or recommendations help?
      placeholder: The HTML filters helped, but nearby tests were still too broad in package foo.
    validations:
      required: true
  - type: textarea
    id: runtime
    attributes:
      label: Runtime and resource behavior
      description: Timeouts, memory pressure, worker behavior, or stability notes.
      placeholder: Bounded run completed in 4m30s with two workers and no timeouts.
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout friction
      description: Setup, config, CI, baseline, or platform friction that slowed adoption.
      placeholder: Needed one extra exclusion rule for generated mocks; otherwise first run was straightforward.
    validations:
      required: true
  - type: input
    id: upstream_thread
    attributes:
      label: Upstream issue or discussion
      description: Optional link to an external repository issue, discussion, or thread created from this adoption feedback.
      placeholder: https://github.com/example/service/issues/123
    validations:
      required: false
  - type: dropdown
    id: external_response_status
    attributes:
      label: External response status
      description: Optional current state of maintainer engagement outside this repository.
      options:
        - No upstream thread opened
        - Upstream thread opened, no maintainer response yet
        - Maintainer replied or asked follow-up questions
        - Maintainer acknowledged and accepted the finding
        - Maintainer rejected, narrowed, or closed the upstream thread
        - Response state not checked recently
    validations:
      required: false
  - type: input
    id: external_response_last_checked
    attributes:
      label: External response last checked
      description: Optional date or timestamp for the most recent upstream-response check.
      placeholder: 2026-06-19
    validations:
      required: false
  - type: dropdown
    id: primary_blocker
    attributes:
      label: Primary blocker class
      description: Which class best describes the main friction in this report?
      options:
        - Signal noise or equivalent-risk survivors
        - Review UX or report usability
        - Runtime or resource behavior
        - CI, install, or platform setup
        - Baseline, governance, or history workflow
        - Unsupported workflow expectation
        - Other
    validations:
      required: true
  - type: dropdown
    id: suggested_outcome
    attributes:
      label: Suggested outcome
      description: What kind of follow-up does this evidence point to?
      options:
        - Documentation clarification
        - Workflow or example improvement
        - Product or code change
        - Explicit support-boundary clarification
        - Need narrower reproduction before acting
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifact links or snippets
      description: Link report directories, CI runs, logs, screenshots, or paste short excerpts.
      placeholder: |
        - mutation-report.json
        - history-dashboard.html
        - CI run URL
    validations:
      required: false
