name: cervomut

on:
  pull_request:
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CervoMutants
        uses: cervantesh/cervo-mutants@main
        with:
          policy: ci-fast
          budget: 5m
          report: summary,json,junit,github-summary
          out: .cervomut/pr
