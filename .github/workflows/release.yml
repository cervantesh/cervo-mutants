name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  compatibility-smoke:
    name: compatibility-smoke (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go-version: "1.25.6"
          - os: windows-latest
            go-version: "1.25.6"
          - os: macos-latest
            go-version: "1.25.6"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test ./...
      - run: go run ./cmd/cervomut doctor
      - run: go run ./cmd/cervomut list-mutators
      - run: go run ./cmd/cervomut fast ./pkg/config --max-mutants 1 --workers 1 --out .cervomut/release-compat-smoke

  publish:
    needs: compatibility-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - run: go run ./cmd/releasehelper verify-compat
      - run: mkdir -p .verify-install/gobin
      - run: >-
          GOBIN="$PWD/.verify-install/gobin"
          GOPROXY=direct
          GOSUMDB=off
          go install github.com/cervantesh/cervo-mutants/cmd/cervomut@"${GITHUB_REF_NAME}"
      - run: >-
          go run ./cmd/releasehelper verify-install
          --binary .verify-install/gobin/cervomut
          --source-root .
          --target ./pkg/config
          --work-dir .verify-install/go-install
          --label go-install
      - run: go vet ./...
      - run: go test ./...
      - run: mkdir -p dist
      - run: >-
          go run ./cmd/releasehelper notes
          --version "${GITHUB_REF_NAME}"
          --out dist/release-notes.md
      - name: Build release archives
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          targets=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch format <<<"$target"
            stage="dist/cervomut_${version}_${goos}_${goarch}"
            binary="cervomut"
            if [ "$goos" = "windows" ]; then
              binary="${binary}.exe"
            fi

            mkdir -p "$stage"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -o "$stage/$binary" ./cmd/cervomut
            cp LICENSE NOTICE TRADEMARKS.md README.md CHANGELOG.md "$stage/"

            if [ "$format" = "zip" ]; then
              (
                cd dist
                zip -qr "cervomut_${version}_${goos}_${goarch}.zip" "$(basename "$stage")"
              )
            else
              tar -C dist -czf "dist/cervomut_${version}_${goos}_${goarch}.tar.gz" "$(basename "$stage")"
            fi

            rm -rf "$stage"
          done

          (
            cd dist
            sha256sum cervomut_${version}_* > SHA256SUMS
          )
      - run: >-
          go run ./cmd/releasehelper verify-release
          --version "${GITHUB_REF_NAME}"
          --dist dist
          --notes dist/release-notes.md
          --manifest-out dist/release-manifest.json
      - run: >-
          go run ./cmd/releasehelper verify-install
          --archive "dist/cervomut_${GITHUB_REF_NAME}_linux_amd64.tar.gz"
          --source-root .
          --target ./pkg/config
          --work-dir .verify-install/archive-install
          --label archive-install
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/cervomut_${{ github.ref_name }}_*.tar.gz
            dist/cervomut_${{ github.ref_name }}_*.zip
            dist/SHA256SUMS
            dist/release-manifest.json
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
