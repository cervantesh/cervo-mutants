name: cervomut

on:
  pull_request:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  pr-lane:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CervoMutants PR lane
        uses: cervantesh/cervo-mutants@main
        with:
          policy: ci-balanced
          budget: 10m
          coverage-prefilter: "true"
          report: summary,json,junit,github-summary
          out: .cervomut/pr

  nightly-lane:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CervoMutants nightly lane
        uses: cervantesh/cervo-mutants@main
        with:
          policy: nightly
          budget: 20m
          report: summary,json,junit,html,sarif,github-summary
          out: .cervomut/nightly
