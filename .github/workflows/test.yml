name: test

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  release:
    types:
      - published
      - prereleased

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - run: go vet ./...
      - run: go test ./...
      - run: go run ./cmd/releasehelper verify-compat
      - run: go test -race ./pkg/engine ./pkg/mutator ./pkg/report
      - run: go run ./cmd/cervomut list-mutators
      - run: go run ./cmd/cervomut fast ./pkg/config --max-mutants 3 --workers 2 --out .cervomut/ci-smoke
      - run: test -f .cervomut/ci-smoke/mutation-report.json
      - run: go run ./cmd/cervomut run ./pkg/config --policy ci-balanced --max-mutants 5 --workers 2 --out .cervomut/ci-balanced-smoke
      - run: >-
          grep -q '"schema_version": "1"'
          .cervomut/ci-balanced-smoke/mutation-report.json

  compatibility-smoke:
    name: compatibility-smoke (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go-version: "1.25.6"
          - os: windows-latest
            go-version: "1.25.6"
          - os: macos-latest
            go-version: "1.25.6"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test ./...
      - run: go run ./cmd/cervomut doctor
      - run: go run ./cmd/cervomut list-mutators
      - run: go run ./cmd/cervomut fast ./pkg/config --max-mutants 1 --workers 1 --out .cervomut/compat-smoke
      - run: go run ./cmd/cervomut report summary --out .cervomut/compat-smoke

  github-action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run local GitHub Action source
        id: cervomut
        uses: ./
        with:
          go-version: "1.25.6"
          targets: ./pkg/config
          policy: ci-fast
          budget: 5m
          report: summary,json
          out: .cervomut/action-smoke
          workers: "1"
          max-mutants: "1"
      - run: test -f .cervomut/action-smoke/mutation-report.json
      - run: test -n "${{ steps.cervomut.outputs.report-dir }}"
      - run: test -f "${{ steps.cervomut.outputs.report-dir }}/mutation-report.json"

  upgrade-compat-smoke:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - name: Determine previous supported release
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "tag=$(gh api repos/${GITHUB_REPOSITORY}/releases/latest --jq .tag_name)" >> "$GITHUB_OUTPUT"
      - name: Download previous release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .upgrade/previous
          gh release download "${{ steps.previous.outputs.tag }}" --pattern "cervomut_${{ steps.previous.outputs.tag }}_linux_amd64.tar.gz" --dir .upgrade/previous
      - run: mkdir -p .upgrade/current
      - run: go build -trimpath -o .upgrade/current/cervomut ./cmd/cervomut
      - run: >-
          go run ./cmd/releasehelper verify-upgrade
          --previous-version "${{ steps.previous.outputs.tag }}"
          --previous-archive ".upgrade/previous/cervomut_${{ steps.previous.outputs.tag }}_linux_amd64.tar.gz"
          --current-binary .upgrade/current/cervomut
          --work-dir .upgrade/smoke
