name: CervoMutants
description: Run bounded CervoMutants mutation testing in GitHub Actions.

inputs:
  go-version:
    description: Go toolchain version used to install and run CervoMutants.
    required: false
    default: "1.25.6"
  go-cache:
    description: Whether to enable the Go module and build cache in setup-go.
    required: false
    default: "true"
  go-cache-dependency-path:
    description: Dependency path glob forwarded to actions/setup-go cache-dependency-path.
    required: false
    default: "**/go.sum"
  cervomut-version:
    description: Optional version suffix passed to go install, for example v0.3.0 or latest. Leave blank to install the same ref as the pinned action.
    required: false
    default: ""
  working-directory:
    description: Working directory where the mutation command should run.
    required: false
    default: "."
  targets:
    description: Space-separated mutation targets passed after cervomut run.
    required: false
    default: "./..."
  policy:
    description: Policy preset used for the run.
    required: false
    default: "ci-fast"
  budget:
    description: Optional mutation budget such as 5m or 20m.
    required: false
    default: "5m"
  report:
    description: Report formats passed to --report.
    required: false
    default: "summary,json,junit,github-summary"
  out:
    description: Report output directory.
    required: false
    default: ".cervomut/reports"
  sample:
    description: Optional sample mode, for example deterministic.
    required: false
    default: ""
  slice-by:
    description: Optional slice key such as package or file.
    required: false
    default: ""
  shard:
    description: Optional shard expression such as 1/4.
    required: false
    default: ""
  max-files-per-run:
    description: Optional max files per run cap.
    required: false
    default: ""
  max-mutants-per-package:
    description: Optional max mutants per package cap.
    required: false
    default: ""
  max-mutants:
    description: Optional max mutants cap.
    required: false
    default: ""
  workers:
    description: Optional worker count override.
    required: false
    default: ""
  coverage-prefilter:
    description: Whether to add --coverage-prefilter.
    required: false
    default: "false"
  actionable-only:
    description: Whether to add --actionable-only to the run output view.
    required: false
    default: "false"

outputs:
  report-dir:
    description: Resolved report directory written by the action.
    value: ${{ steps.run-cervomut.outputs.report-dir }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: ${{ inputs.go-cache }}
        cache-dependency-path: ${{ inputs.go-cache-dependency-path }}

    - name: Install CervoMutants
      shell: pwsh
      run: |
        function Invoke-GoInstall([string]$target) {
          go install $target
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
        }

        $version = '${{ inputs.cervomut-version }}'.Trim()
        if ([string]::IsNullOrWhiteSpace($version)) {
          if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_ACTION_REF)) {
            $version = $env:GITHUB_ACTION_REF.Trim()
            Write-Host "Installing CervoMutants from action ref $version"
            Invoke-GoInstall "github.com/cervantesh/cervo-mutants/cmd/cervomut@$version"
            return
          }
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_ACTION_PATH)) {
            throw "GITHUB_ACTION_PATH is not available; set cervomut-version explicitly."
          }
          Write-Host "Installing CervoMutants from local action source at $env:GITHUB_ACTION_PATH"
          Push-Location $env:GITHUB_ACTION_PATH
          try {
            go install ./cmd/cervomut
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } finally {
            Pop-Location
          }
          return
        }

        Write-Host "Installing CervoMutants version $version"
        Invoke-GoInstall "github.com/cervantesh/cervo-mutants/cmd/cervomut@$version"

    - name: Run CervoMutants
      id: run-cervomut
      shell: pwsh
      working-directory: ${{ inputs.working-directory }}
      run: |
        function Add-ArgPair([ref]$ArgsRef, [string]$Flag, [string]$Value) {
          if (-not [string]::IsNullOrWhiteSpace($Value)) {
            $ArgsRef.Value += @($Flag, $Value)
          }
        }

        $cmdArgs = @('run')
        $targets = @('${{ inputs.targets }}' -split '\s+' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
        if ($targets.Count -eq 0) {
          $targets = @('./...')
        }
        $cmdArgs += $targets

        Add-ArgPair ([ref]$cmdArgs) '--policy' '${{ inputs.policy }}'
        Add-ArgPair ([ref]$cmdArgs) '--budget' '${{ inputs.budget }}'
        Add-ArgPair ([ref]$cmdArgs) '--report' '${{ inputs.report }}'
        Add-ArgPair ([ref]$cmdArgs) '--out' '${{ inputs.out }}'
        Add-ArgPair ([ref]$cmdArgs) '--sample' '${{ inputs.sample }}'
        Add-ArgPair ([ref]$cmdArgs) '--slice-by' '${{ inputs.slice-by }}'
        Add-ArgPair ([ref]$cmdArgs) '--shard' '${{ inputs.shard }}'
        Add-ArgPair ([ref]$cmdArgs) '--max-files-per-run' '${{ inputs.max-files-per-run }}'
        Add-ArgPair ([ref]$cmdArgs) '--max-mutants-per-package' '${{ inputs.max-mutants-per-package }}'
        Add-ArgPair ([ref]$cmdArgs) '--max-mutants' '${{ inputs.max-mutants }}'
        Add-ArgPair ([ref]$cmdArgs) '--workers' '${{ inputs.workers }}'

        if ('${{ inputs.coverage-prefilter }}' -eq 'true') {
          $cmdArgs += '--coverage-prefilter'
        }
        if ('${{ inputs.actionable-only }}' -eq 'true') {
          $cmdArgs += '--actionable-only'
        }

        Write-Host ('Running: cervomut ' + ($cmdArgs -join ' '))
        & cervomut @cmdArgs

        if ($env:GITHUB_OUTPUT) {
          $outDir = '${{ inputs.out }}'
          $workingDirectory = '${{ inputs.working-directory }}'
          if ([string]::IsNullOrWhiteSpace($workingDirectory)) {
            $workingDirectory = '.'
          }

          if ([System.IO.Path]::IsPathRooted($outDir)) {
            $reportDir = [System.IO.Path]::GetFullPath($outDir)
          } else {
            $workingRoot = $workingDirectory
            if (-not [System.IO.Path]::IsPathRooted($workingRoot)) {
              $workingRoot = Join-Path $env:GITHUB_WORKSPACE $workingRoot
            }
            $reportDir = [System.IO.Path]::GetFullPath((Join-Path $workingRoot $outDir))
          }

          "report-dir=$reportDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        }
