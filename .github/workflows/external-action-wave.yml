name: external-action-wave

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Path to the hosted-wave manifest checked into this repository.
        required: false
        default: docs/evaluations/external-github-action-wave-v0.4.2-candidates.json

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      manifest_path: ${{ steps.matrix.outputs.manifest_path }}
      tracking_issue: ${{ steps.matrix.outputs.tracking_issue }}
      action_ref: ${{ steps.matrix.outputs.action_ref }}
      checkout_ref: ${{ steps.matrix.outputs.checkout_ref }}
      install_path: ${{ steps.matrix.outputs.install_path }}
    steps:
      - uses: actions/checkout@v7
      - id: matrix
        shell: bash
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          test -f "$MANIFEST_PATH"
          matrix="$(
            jq -c '
              {
                include: [
                  .jobs[] |
                  {
                    name,
                    repository: (.url | sub("^https://github.com/"; "") | sub("\\.git$"; "")),
                    ref,
                    target,
                    profile,
                    go_version: (.go_version // ""),
                    policy,
                    budget,
                    max_mutants,
                    workers,
                    sample: (.sample // ""),
                    coverage_prefilter: ((.coverage_prefilter // false) | tostring)
                  }
                ]
              }
            ' "$MANIFEST_PATH"
          )"
          tracking_issue="$(jq -r '.tracking_issue // ""' "$MANIFEST_PATH")"
          action_ref="$(jq -r '.action_ref // env.GITHUB_SHA' "$MANIFEST_PATH")"
          checkout_ref="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${action_ref}" \
            | jq -r '.sha'
          )"
          if [ -z "$checkout_ref" ] || [ "$checkout_ref" = "null" ]; then
            echo "failed to resolve action_ref '$action_ref' to a commit SHA" >&2
            exit 1
          fi
          install_path="$(jq -r '.install_path // ("github-action@" + (.action_ref // env.GITHUB_SHA))' "$MANIFEST_PATH")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"
          echo "tracking_issue=$tracking_issue" >> "$GITHUB_OUTPUT"
          echo "action_ref=$action_ref" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "install_path=$install_path" >> "$GITHUB_OUTPUT"

  wave:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: cervomut-source
          ref: ${{ needs.plan.outputs.checkout_ref }}

      - uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: target
          fetch-depth: 1

      - name: Setup Go for version resolution
        uses: actions/setup-go@v6
        with:
          go-version-file: cervomut-source/go.mod
          cache: false

      - name: Resolve Go version
        id: resolve-go-version
        shell: bash
        working-directory: cervomut-source
        env:
          REQUESTED_GO_VERSION: ${{ matrix.go_version }}
        run: |
          resolution_json="$(go run ./cmd/actionhelper resolve-go-version --requested "$REQUESTED_GO_VERSION" --target-gomod ../target/go.mod --action-gomod go.mod)"
          echo "go_version=$(jq -r '.go_version' <<<"$resolution_json")" >> "$GITHUB_OUTPUT"
          echo "go_version_requested=$(jq -r '.go_version_requested // \"\"' <<<"$resolution_json")" >> "$GITHUB_OUTPUT"
          echo "go_version_target=$(jq -r '.go_version_target // \"\"' <<<"$resolution_json")" >> "$GITHUB_OUTPUT"
          echo "go_version_action_min=$(jq -r '.go_version_action_min' <<<"$resolution_json")" >> "$GITHUB_OUTPUT"

      - name: Run CervoMutants
        id: cervomut
        uses: ./cervomut-source
        with:
          go-version: ${{ steps.resolve-go-version.outputs.go_version }}
          working-directory: target
          targets: ${{ matrix.target }}
          policy: ${{ matrix.policy }}
          budget: ${{ matrix.budget }}
          report: summary,json,github-summary
          out: .cervomut/external-wave/${{ matrix.name }}
          sample: ${{ matrix.sample }}
          max-mutants: ${{ matrix.max_mutants }}
          workers: ${{ matrix.workers }}
          coverage-prefilter: ${{ matrix.coverage_prefilter }}

      - name: Extract wave result
        if: always()
        shell: bash
        working-directory: cervomut-source
        env:
          JOB_STATUS: ${{ job.status }}
          REPO_NAME: ${{ matrix.name }}
          REPOSITORY: ${{ matrix.repository }}
          REPO_REF: ${{ matrix.ref }}
          TARGET: ${{ matrix.target }}
          PROFILE: ${{ matrix.profile }}
          POLICY: ${{ matrix.policy }}
          BUDGET: ${{ matrix.budget }}
          SAMPLE: ${{ matrix.sample }}
          GO_VERSION: ${{ steps.resolve-go-version.outputs.go_version }}
          GO_VERSION_REQUESTED: ${{ steps.resolve-go-version.outputs.go_version_requested }}
          GO_VERSION_TARGET: ${{ steps.resolve-go-version.outputs.go_version_target }}
          GO_VERSION_ACTION_MIN: ${{ steps.resolve-go-version.outputs.go_version_action_min }}
          COVERAGE_PREFILTER: ${{ matrix.coverage_prefilter }}
          MAX_MUTANTS: ${{ matrix.max_mutants }}
          WORKERS: ${{ matrix.workers }}
          ACTION_REF: ${{ needs.plan.outputs.action_ref }}
          INSTALL_PATH: ${{ needs.plan.outputs.install_path }}
        run: |
          report_dir="../target/.cervomut/external-wave/${REPO_NAME}"
          generated_at="$(date -u +%FT%TZ)"
          go run ./cmd/actionhelper build-wave-result \
            --generated-at "$generated_at" \
            --name "$REPO_NAME" \
            --repository "$REPOSITORY" \
            --install-path "$INSTALL_PATH" \
            --action-ref "$ACTION_REF" \
            --ref "$REPO_REF" \
            --target "$TARGET" \
            --profile "$PROFILE" \
            --go-version "$GO_VERSION" \
            --go-version-target "$GO_VERSION_TARGET" \
            --go-version-action-min "$GO_VERSION_ACTION_MIN" \
            --go-version-requested "$GO_VERSION_REQUESTED" \
            --policy "$POLICY" \
            --budget "$BUDGET" \
            --sample "$SAMPLE" \
            --coverage-prefilter "$COVERAGE_PREFILTER" \
            --report-dir "$report_dir" \
            --job-status "$JOB_STATUS" \
            --max-mutants "$MAX_MUTANTS" \
            --workers "$WORKERS" \
            > ../wave-result.json

      - name: Append repo summary
        if: always()
        shell: bash
        working-directory: cervomut-source
        run: |
          go run ./cmd/actionhelper render-wave-result-markdown --path ../wave-result.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload wave artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          include-hidden-files: true
          if-no-files-found: warn
          name: external-wave-${{ matrix.name }}
          path: |
            target/.cervomut/external-wave/${{ matrix.name }}
            wave-result.json

  summarize:
    if: always()
    needs:
      - plan
      - wave
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: cervomut-source
          ref: ${{ needs.plan.outputs.checkout_ref }}

      - name: Setup Go for summary helpers
        uses: actions/setup-go@v6
        with:
          go-version-file: cervomut-source/go.mod
          cache: false

      - name: Download wave artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: external-wave-*

      - name: Build aggregate summary
        shell: bash
        working-directory: cervomut-source
        env:
          TRACKING_ISSUE: ${{ needs.plan.outputs.tracking_issue }}
          MANIFEST_PATH: ${{ needs.plan.outputs.manifest_path }}
          ACTION_REF: ${{ needs.plan.outputs.action_ref }}
          INSTALL_PATH: ${{ needs.plan.outputs.install_path }}
        run: |
          generated_at="$(date -u +%FT%TZ)"
          go run ./cmd/actionhelper build-wave-summary \
            --generated-at "$generated_at" \
            --tracking-issue "$TRACKING_ISSUE" \
            --manifest-path "$MANIFEST_PATH" \
            --action-ref "$ACTION_REF" \
            --install-path "$INSTALL_PATH" \
            --artifacts-dir ../artifacts \
            > ../wave-summary.json

          go run ./cmd/actionhelper render-wave-summary-markdown --path ../wave-summary.json > ../wave-summary.md

      - name: Publish combined summary
        shell: bash
        run: cat wave-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: external-wave-summary
          path: |
            wave-summary.json
            wave-summary.md
